      <h1>尊重你的隐私。</h1>
      <p>Haomac Labs 不会出售你的个人信息。当前网站不会创建账户，也不会在服务器上保存订阅表单中输入的邮箱。</p>
      <p>当你通过电子邮件联系我们时，我们只会使用你提供的信息来回复并处理相关支持请求。</p>
      <p>随着产品和服务更新，本政策可能相应调整。如有疑问，请联系 <a href="mailto:support@haomaclabs.com">support@haomaclabs.com</a>。</p>
